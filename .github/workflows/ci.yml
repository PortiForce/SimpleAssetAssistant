name: CI

on:
  pull_request:
    branches: [ main ]

jobs:
  format:
    name: Code Format
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore dependencies
        run: dotnet restore src/SimpleAssetAssistant.sln

      - name: Check formatting
        run: dotnet format src/SimpleAssetAssistant.sln --verify-no-changes --severity warn

  build-and-test:
    name: Build and Test
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore dependencies
        run: dotnet restore src/SimpleAssetAssistant.sln

      - name: Build
        run: dotnet build src/SimpleAssetAssistant.sln --no-restore --configuration Release

      - name: Test
        run: dotnet test src/SimpleAssetAssistant.sln --no-build --configuration Release --verbosity normal
